<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="크로닛 - 숏폼 회사 실무진이 직접 만든 릴스 자동화 솔루션" />
    <meta property="og:title" content="Chronit - 숏폼 자동화 솔루션" />
    <meta property="og:description" content="1시간의 노가다를 1분의 자동화로. 수익화에만 집중하세요." />
    <meta property="og:image" content="/favicon.png" />
    <title>Chronit - 숏폼 자동화 솔루션</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Channel Talk -->
    <script>
      (function () {
        var w = window
        if (w.ChannelIO) {
          return (window.console.error || window.console.log || function () {})(
            'ChannelIO script included twice.'
          )
        }
        var ch = function () {
          ch.c(arguments)
        }
        ch.q = []
        ch.c = function (args) {
          ch.q.push(args)
        }
        w.ChannelIO = ch
        function l() {
          if (w.ChannelIOInitialized) return
          w.ChannelIOInitialized = true
          var s = document.createElement('script')
          s.type = 'text/javascript'
          s.async = true
          s.src = 'https://cdn.channel.io/plugin/ch-plugin-web.js'
          var x = document.getElementsByTagName('script')[0]
          if (x.parentNode) x.parentNode.insertBefore(s, x)
        }
        if (document.readyState === 'complete') l()
        else {
          w.addEventListener('DOMContentLoaded', l)
          w.addEventListener('load', l)
        }
      })()
      ChannelIO('boot', {
        pluginKey: '5efe3bed-3b08-450e-a971-d261e702d11b',
      })
    </script>
  </body>
</html>
